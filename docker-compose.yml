version: '3.9'

services:
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    command: pnpm --filter @ai-ebook/backend dev
    working_dir: /app
    ports:
      - "3001:3001"
    volumes:
      - .:/app
    environment:
      MONGO_URI: mongodb://mongo:27017/ebooks
      REDIS_HOST: redis
      REDIS_PORT: 6379

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    command: pnpm --filter @ai-ebook/frontend dev
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      - .:/app

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  mongo_data:
